name = "shirakaba-quest-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "shirakaba-quest"
database_id = "abc32c5c-c253-470a-95f0-945bfc49123e"

[[kv_namespaces]]
binding = "KV"
id = "c2bf2279ae10447cbe54168b927298c8"

[[r2_buckets]]
binding = "R2"
bucket_name = "shirakaba-assets"

[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://shirakaba-quest.pages.dev"

# ---- 本番環境 ----
# wrangler deploy --env production で使用
[env.production.vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://shirakaba-quest.pages.dev"
# 独自ドメイン使用時: CORS_ORIGIN = "https://your-domain.com"

# Secrets は wrangler secret put で設定（コードに書かない）:
#   wrangler secret put SENDGRID_API_KEY
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put GOOGLE_VISION_API_KEY
#   wrangler secret put SESSION_SECRET  ← openssl rand -hex 32 で生成
